<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEVBALL — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --court-green:#2d5a27;--clay:#c4622d;--clay-light:#d4794a;
    --clay-dark:#8b3a1a;--clay-bg:#f5e6d3;--ink:#1a1a18;--gold:#d4a843;--white:#fafaf8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--clay-bg);color:var(--ink);min-height:100vh;}

  /* NAV */
  nav{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:18px 48px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--clay);}
  .logo{font-family:'Black Ops One',cursive;font-size:24px;letter-spacing:3px;color:var(--white);text-decoration:none;}
  .logo span{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .nav-link{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.2s;}
  .nav-link:hover{color:var(--gold);}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all 0.2s;}
  .logout-btn:hover{border-color:#e74c3c;color:#e74c3c;}

  /* HERO BANNER */
  .profile-banner{background:linear-gradient(135deg,var(--clay-dark) 0%,var(--clay) 60%,var(--clay-light) 100%);padding:60px 48px 0;position:relative;overflow:hidden;}
  .profile-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:var(--clay-bg);border-radius:40px 40px 0 0;}
  .banner-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;gap:32px;position:relative;z-index:1;}
  .profile-avatar-wrap{width:110px;height:110px;border-radius:50%;border:4px solid rgba(255,255,255,0.4);overflow:hidden;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:-20px;}
  .profile-avatar-wrap img{width:100%;height:100%;object-fit:cover;}
  .profile-initials-big{font-family:'Black Ops One',cursive;font-size:36px;color:rgba(255,255,255,0.8);}
  .profile-banner-info{padding-bottom:28px;flex:1;}
  .profile-banner-name{font-family:'Black Ops One',cursive;font-size:clamp(28px,4vw,44px);color:#fff;letter-spacing:2px;line-height:1;}
  .profile-banner-sub{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-top:6px;}
  .admin-crown{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--ink);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:4px 12px;text-transform:uppercase;font-weight:700;margin-top:8px;}

  /* MAIN CONTENT */
  .profile-body{max-width:1100px;margin:0 auto;padding:40px 48px 80px;}

  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
  .stat-card{background:#fff;padding:22px 20px;border-bottom:3px solid var(--clay);text-align:center;}
  .stat-val{font-family:'Black Ops One',cursive;font-size:36px;color:var(--clay);display:block;}
  .stat-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:#999;text-transform:uppercase;margin-top:4px;}

  /* GRID */
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .full-col{grid-column:1/-1;}

  /* PANEL */
  .panel{background:#fff;border-top:4px solid var(--clay);}
  .panel-header{padding:18px 24px;border-bottom:1px solid #f0e4d2;display:flex;align-items:center;justify-content:space-between;}
  .panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--ink);}
  .panel-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--clay);text-transform:uppercase;}
  .panel-body{padding:20px 24px;}

  /* MATCHES */
  .match-item{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f5ede5;}
  .match-item:last-child{border-bottom:none;}
  .match-player{font-weight:600;font-size:14px;}
  .match-player.me{color:var(--clay-dark);}
  .match-player.right{text-align:right;}
  .match-score{font-family:'Black Ops One',cursive;font-size:18px;color:var(--clay);text-align:center;white-space:nowrap;}
  .match-status{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:#bbb;text-align:center;display:block;}
  .match-result-w{color:#2d5a27;font-size:9px;font-family:'Space Mono',monospace;letter-spacing:1px;display:block;text-align:center;}
  .match-result-l{color:#c0392b;font-size:9px;font-family:'Space Mono',monospace;letter-spacing:1px;display:block;text-align:center;}

  /* EDIT PROFILE */
  .edit-field{margin-bottom:16px;}
  .edit-field label{display:block;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,0,0,0.4);margin-bottom:6px;}
  .edit-field input,.edit-field select,.edit-field textarea{width:100%;padding:11px 14px;border:1.5px solid #d4c4b0;background:#fdfaf7;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.2s;resize:vertical;}
  .edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{border-color:var(--clay);}
  .edit-field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .save-profile-btn{background:var(--clay);color:#fff;border:none;padding:12px 28px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:background 0.2s;text-transform:uppercase;}
  .save-profile-btn:hover{background:var(--clay-dark);}

  /* AVATAR EDIT */
  .avatar-edit-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
  .avatar-edit-preview{width:64px;height:64px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,var(--clay-dark),var(--clay));display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',cursive;font-size:22px;color:#fff;flex-shrink:0;border:3px solid var(--clay);}
  .avatar-edit-preview img{width:100%;height:100%;object-fit:cover;}
  .avatar-change-btn{position:relative;overflow:hidden;background:transparent;border:1.5px solid var(--clay);color:var(--clay);padding:8px 16px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
  .avatar-change-btn:hover{background:var(--clay);color:#fff;}
  .avatar-change-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}

  /* RANKING BADGE */
  .rank-display{display:flex;align-items:center;gap:16px;padding:16px 0;}
  .rank-number{font-family:'Black Ops One',cursive;font-size:56px;color:var(--clay);line-height:1;}
  .rank-info{}
  .rank-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:#999;text-transform:uppercase;}
  .rank-pts{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--ink);}

  /* EMPTY */
  .empty-p{text-align:center;padding:32px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:#bbb;text-transform:uppercase;}

  /* TOAST */
  .toast{position:fixed;bottom:28px;right:28px;background:var(--ink);color:#fff;padding:13px 22px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;z-index:1000;transform:translateY(80px);opacity:0;transition:all 0.3s;border-left:4px solid var(--gold);}
  .toast.show{transform:translateY(0);opacity:1;}

  @media(max-width:768px){
    nav{padding:14px 20px;}
    .profile-banner{padding:40px 20px 0;}
    .banner-inner{flex-direction:column;align-items:flex-start;gap:16px;}
    .profile-avatar-wrap{margin-bottom:0;}
    .profile-body{padding:24px 20px 60px;}
    .stats-row{grid-template-columns:1fr 1fr;}
    .profile-grid{grid-template-columns:1fr;}
    .edit-field-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">KEV<span>●</span>BALL</a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← Home</a>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
</nav>

<div class="profile-banner">
  <div class="banner-inner">
    <div class="profile-avatar-wrap" id="bannerAvatar">
      <span class="profile-initials-big" id="bannerInitials">?</span>
    </div>
    <div class="profile-banner-info">
      <div class="profile-banner-name" id="bannerName">Loading...</div>
      <div class="profile-banner-sub" id="bannerSub">@username</div>
      <div id="adminCrown" style="display:none"><span class="admin-crown">👑 Commissioner · Admin</span></div>
    </div>
  </div>
</div>

<div class="profile-body">

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><span class="stat-val" id="statW">0</span><span class="stat-lbl">Wins</span></div>
    <div class="stat-card"><span class="stat-val" id="statL">0</span><span class="stat-lbl">Losses</span></div>
    <div class="stat-card"><span class="stat-val" id="statPts">0</span><span class="stat-lbl">Points</span></div>
    <div class="stat-card"><span class="stat-val" id="statRank">—</span><span class="stat-lbl">Ranking</span></div>
  </div>

  <div class="profile-grid">

    <!-- MY MATCHES -->
    <div class="panel full-col">
      <div class="panel-header">
        <span class="panel-title">MY MATCHES</span>
        <span class="panel-tag">All Weeks</span>
      </div>
      <div class="panel-body" id="myMatchesPanel"></div>
    </div>

    <!-- EDIT PROFILE -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">EDIT PROFILE</span>
        <span class="panel-tag">Player Card</span>
      </div>
      <div class="panel-body">
        <div class="avatar-edit-row">
          <div class="avatar-edit-preview" id="editAvatarPreview"></div>
          <div>
            <div style="font-weight:600;font-size:14px;margin-bottom:4px" id="editDisplayName">—</div>
            <button class="avatar-change-btn">
              <input type="file" accept="image/*" onchange="handleEditAvatar(this)"/>
              Change Photo
            </button>
          </div>
        </div>
        <div class="edit-field-row">
          <div class="edit-field">
            <label>First Name</label>
            <input type="text" id="editFirst"/>
          </div>
          <div class="edit-field">
            <label>Last Name</label>
            <input type="text" id="editLast"/>
          </div>
        </div>
        <div class="edit-field">
          <label>Nickname</label>
          <input type="text" id="editNick" placeholder="e.g. The Commissioner"/>
        </div>
        <div class="edit-field">
          <label>Play Style</label>
          <select id="editStyle">
            <option value="">Select...</option>
            <option value="Aggressive">Aggressive</option>
            <option value="Defensive">Defensive</option>
            <option value="Balanced">Balanced</option>
            <option value="Power">Power</option>
            <option value="Technical">Technical</option>
            <option value="Chaos Agent">Chaos Agent</option>
          </select>
        </div>
        <div class="edit-field">
          <label>Bio / Trash Talk</label>
          <textarea id="editBio" rows="3" placeholder="Tell us about your game..."></textarea>
        </div>
        <button class="save-profile-btn" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>

    <!-- STANDINGS -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">STANDINGS</span>
        <span class="panel-tag">Current Season</span>
      </div>
      <div class="panel-body" id="standingsPanel"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ===== AUTH CHECK =====
const sessionRaw = sessionStorage.getItem('kb_session');
if(!sessionRaw){ location.href='login.html'; }
const session = JSON.parse(sessionRaw);

function getUsers(){ return JSON.parse(localStorage.getItem('kb_users')||'[]'); }
function saveUsers(u){ localStorage.setItem('kb_users',JSON.stringify(u)); }

// Load current user
let currentUser = getUsers().find(u=>u.id===session.id);
if(!currentUser && session.username==='kevin'){
  // Kevin may not have a user record if he logged in via the hardcoded path
  currentUser={id:1,username:'kevin',firstName:'Kevin',lastName:'Orellana',name:'Kevin Orellana',nick:'The Commissioner',avatar:null,isAdmin:true,createdAt:new Date().toISOString()};
}
if(!currentUser){ sessionStorage.clear(); location.href='login.html'; }

let editAvatarData = currentUser.avatar || null;

// ===== RENDER BANNER =====
function renderBanner(){
  const initials=(currentUser.firstName[0]+(currentUser.lastName?currentUser.lastName[0]:'')).toUpperCase();
  const bannerAv=document.getElementById('bannerAvatar');
  if(currentUser.avatar){
    bannerAv.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover"/>`;
  } else {
    bannerAv.innerHTML=`<span class="profile-initials-big">${initials}</span>`;
  }
  document.getElementById('bannerName').textContent = currentUser.name || (currentUser.firstName+' '+currentUser.lastName);
  document.getElementById('bannerSub').textContent = '@'+currentUser.username + (currentUser.nick ? ' · "'+currentUser.nick+'"' : '');
  if(currentUser.isAdmin) document.getElementById('adminCrown').style.display='block';
}

// ===== RENDER STATS =====
function renderStats(){
  const players=JSON.parse(localStorage.getItem('kb_players')||'[]');
  const me=players.find(p=>p.name.toLowerCase()===(currentUser.name||'').toLowerCase());
  const wins=me?me.wins||0:0;
  const losses=me?me.losses||0:0;
  const pts=me?me.points||0:0;
  document.getElementById('statW').textContent=wins;
  document.getElementById('statL').textContent=losses;
  document.getElementById('statPts').textContent=pts;

  // Rank
  const sorted=[...players].sort((a,b)=>(b.points||0)-(a.points||0));
  const rank=sorted.findIndex(p=>p.name.toLowerCase()===(currentUser.name||'').toLowerCase());
  document.getElementById('statRank').textContent=rank>=0?'#'+(rank+1):'—';
}

// ===== RENDER MY MATCHES =====
function renderMyMatches(){
  const weeks=JSON.parse(localStorage.getItem('kb_weeks')||'[]');
  const myName=(currentUser.name||'').toLowerCase();
  const panel=document.getElementById('myMatchesPanel');
  let html='';
  let found=false;

  weeks.forEach(week=>{
    const myMatches=(week.matches||[]).filter(m=>
      m.p1.toLowerCase()===myName || m.p2.toLowerCase()===myName
    );
    if(!myMatches.length) return;
    found=true;
    html+=`<div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:8px;margin-top:${html?'20px':'0'}">${week.label}</div>`;
    myMatches.forEach(m=>{
      const isP1=m.p1.toLowerCase()===myName;
      const myScore=m.played?(isP1?m.score1:m.score2):null;
      const oppScore=m.played?(isP1?m.score2:m.score1):null;
      const opp=isP1?m.p2:m.p1;
      const won=m.played&&myScore>oppScore;
      const lost=m.played&&myScore<oppScore;
      html+=`<div class="match-item">
        <div class="match-player me">${currentUser.firstName}</div>
        <div>
          ${m.played
            ?`<span class="match-score">${myScore} — ${oppScore}</span>
               <span class="${won?'match-result-w':'match-result-l'}">${won?'WIN ✓':'LOSS'}</span>`
            :`<span class="match-score" style="font-size:14px;color:#bbb">vs</span>
               <span class="match-status">Upcoming</span>`
          }
        </div>
        <div class="match-player right">${opp}</div>
      </div>`;
    });
  });

  panel.innerHTML = found ? html : '<div class="empty-p">No matches scheduled yet</div>';
}

// ===== RENDER STANDINGS =====
function renderStandings(){
  const players=JSON.parse(localStorage.getItem('kb_players')||'[]');
  const sorted=[...players].sort((a,b)=>(b.points||0)-(a.points||0));
  const myName=(currentUser.name||'').toLowerCase();
  const panel=document.getElementById('standingsPanel');
  if(!sorted.length){ panel.innerHTML='<div class="empty-p">No players yet</div>'; return; }
  panel.innerHTML=sorted.slice(0,8).map((p,i)=>{
    const isMe=p.name.toLowerCase()===myName;
    return`<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f5ede5;${i===sorted.slice(0,8).length-1?'border-bottom:none':''}">
      <span style="font-family:'Black Ops One',cursive;font-size:18px;color:${i===0?'var(--gold)':i===1?'#aaa':i===2?'#cd7f32':'rgba(0,0,0,0.15)'};width:28px">${i+1}</span>
      <span style="flex:1;font-weight:${isMe?700:400};font-size:14px;color:${isMe?'var(--clay-dark)':'var(--ink)'}">${p.name}${isMe?' (you)':''}</span>
      <span style="font-family:'Black Ops One',cursive;font-size:15px;color:var(--clay)">${p.points||0}</span>
    </div>`;
  }).join('');
}

// ===== EDIT PROFILE FORM =====
function populateEditForm(){
  document.getElementById('editFirst').value=currentUser.firstName||'';
  document.getElementById('editLast').value=currentUser.lastName||'';
  document.getElementById('editNick').value=currentUser.nick||'';
  document.getElementById('editStyle').value=currentUser.style||'';
  document.getElementById('editBio').value=currentUser.bio||'';
  document.getElementById('editDisplayName').textContent=currentUser.name||'';

  const prev=document.getElementById('editAvatarPreview');
  if(currentUser.avatar){
    prev.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
  } else {
    const initials=(currentUser.firstName[0]+(currentUser.lastName?currentUser.lastName[0]:'')).toUpperCase();
    prev.textContent=initials;
  }
}

function handleEditAvatar(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editAvatarData=e.target.result;
    const prev=document.getElementById('editAvatarPreview');
    prev.innerHTML=`<img src="${editAvatarData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
  };
  reader.readAsDataURL(file);
}

function saveProfile(){
  const first=document.getElementById('editFirst').value.trim();
  const last=document.getElementById('editLast').value.trim();
  if(!first||!last){ toast('Name cannot be empty!'); return; }

  const users=getUsers();
  const idx=users.findIndex(u=>u.id===currentUser.id);

  const updatedUser={
    ...currentUser,
    firstName:first, lastName:last,
    name:first+' '+last,
    nick:document.getElementById('editNick').value.trim(),
    style:document.getElementById('editStyle').value,
    bio:document.getElementById('editBio').value.trim(),
    avatar:editAvatarData,
  };

  if(idx>=0) users[idx]=updatedUser;
  else users.push(updatedUser);
  saveUsers(users);
  currentUser=updatedUser;

  // Sync to bios
  const bios=JSON.parse(localStorage.getItem('kb_bios')||'[]');
  const bioIdx=bios.findIndex(b=>b.id===currentUser.id || b.name.toLowerCase()===updatedUser.name.toLowerCase());
  if(bioIdx>=0){
    bios[bioIdx]={...bios[bioIdx], name:updatedUser.name, nick:updatedUser.nick, style:updatedUser.style, bio:updatedUser.bio, avatar:updatedUser.avatar};
  }
  localStorage.setItem('kb_bios',JSON.stringify(bios));

  renderBanner();
  document.getElementById('editDisplayName').textContent=updatedUser.name;
  toast('Profile saved! ✓');
}

// ===== LOGOUT =====
function doLogout(){
  sessionStorage.removeItem('kb_session');
  sessionStorage.removeItem('kb_admin');
  location.href='login.html';
}

// ===== INIT =====
renderBanner();
renderStats();
renderMyMatches();
renderStandings();
populateEditForm();
</script>
</body>
</html>
